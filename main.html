<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas CSS dan JS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <marquee behavior="scroll" direction="left">Selamat datang di Todo List!</marquee>

    <div class="card">
        <h1>Todo List</h1>

        <div id="formtodo">
            <input type="text" id="inputTask" placeholder="Masukkan tugas">
            <input type="date" id="inputDate">
            <select id="selectStatus" aria-label="Status tugas">
                <option value="Belum" selected>Belum selesai</option>
                <option value="Selesai">Selesai</option>
            </select>
            <button id="btnTambahTodo" class="btn">Tambah</button>
        </div>


        <h3>Daftar Tugas</h3>
        <ul id="listTugas"></ul>
    </div>

    <script src="script.js"></script>

</body>
</html>
